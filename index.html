<!DOCTYPE html>
<html lang="en">
<head>

    viewport-fit=cover: lets content extend into safe areas so we can
    apply env(safe-area-inset-*) padding ourselves for a full-bleed look.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Song arrangement sketchpad for working musicians">

  <!-- PWA / iOS home screen -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- 'default' gives a white status bar, matching the light theme -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Chord">
  <meta name="theme-color" content="#ffffff">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">

  <title>Chord</title>
  <link rel="stylesheet" href="style.css?v=7">
</head>
<body>
  <div id="app"></div>

  <script src="audio.js?v=7"></script>
  <script src="data.js?v=7"></script>
  <script src="state.js?v=7"></script>
  <script src="theory.js?v=7"></script>
  <script src="ui.js?v=7"></script>
  <script src="app.js?v=7"></script>
</body>
</html>
